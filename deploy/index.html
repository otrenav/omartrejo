<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omar Trejo - Intensity is my sanctuary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Lora:ital@1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      filter: grayscale(1) contrast(1.3);
      z-index: 0;
    }

    .gradient {
      position: fixed;
      inset: 0;
      background: linear-gradient(
        to top,
        transparent 40%,
        rgba(0, 0, 0, 0.6) 100%
      );
      z-index: 1;
    }

    .content {
      position: fixed;
      top: 0;
      left: 0;
      padding: 6vw;
      z-index: 2;
    }

    .phrase {
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: 7vw;
      line-height: 1.0;
      color: rgba(255, 255, 255, 0.85);
      text-transform: uppercase;
      letter-spacing: 0.02em;
      display: block;
      opacity: 0;
      transform: translateY(-24px);
      animation: fade-down 0.7s ease forwards 0.2s;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: rgba(255, 255, 255, 0.15);
      margin-top: 2.4vw;
      opacity: 0;
      transform: scaleX(0);
      transform-origin: left;
      animation: divider-in 0.6s ease forwards 0.5s;
    }

    .sub-phrase {
      font-family: 'Lora', serif;
      font-weight: 400;
      font-style: italic;
      font-size: 1.3rem;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.02em;
      margin-top: 0.8vw;
      opacity: 0;
      transform: translateY(-12px);
      animation: fade-down 0.6s ease forwards 0.7s;
    }

    .sub-phrase + .sub-phrase {
      margin-top: 0.3vw;
      animation-delay: 0.8s;
    }

    .link-wrap {
      margin-top: 2vw;
      opacity: 0;
      transform: translateY(-16px);
      animation: fade-down 0.6s ease forwards 0.85s;
    }

    .link-wrap a {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.55);
      text-decoration: none;
      text-transform: none;
      letter-spacing: 0.05em;
      transition: color 0.25s ease;
    }

    .link-wrap a:hover {
      color: rgba(255, 255, 255, 0.9);
    }

    @keyframes fade-down {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes divider-in {
      to {
        opacity: 1;
        transform: scaleX(1);
      }
    }
  </style>
</head>
<body>

  <img
    class="bg"
    src="https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?w=3840&q=85&fit=crop"
    alt=""
    aria-hidden="true"
  >

  <div class="gradient"></div>

  <div class="content">
    <span class="phrase">Intensity is my sanctuary</span>
    <div class="divider"></div>
    <p class="sub-phrase">Sí quiero. Sí puedo. Y lo voy a lograr.</p>
    <p class="sub-phrase">Al infinito y más allá.</p>
    <div class="link-wrap">
      <a href="https://mllabs.com" target="_blank" rel="noopener">mllabs.com &rarr;</a>
    </div>
  </div>

</body>
</html>
